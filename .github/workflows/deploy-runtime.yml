name: Deploy Runtime

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync runtime repo
        shell: bash
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.env' \
            ./ "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}:/srv/shared-agent-vps-runtime/"

      - name: Deploy runtime
        shell: bash
        run: |
          ssh "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}" \
            'cd /srv/shared-agent-vps-runtime && bash scripts/bootstrap-vps.sh'
