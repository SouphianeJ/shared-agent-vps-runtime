services:
  agent-runtime-shell:
    build:
      context: .
      dockerfile: docker/codex-runner/Dockerfile
    image: shared-agent-vps-runtime:local
    container_name: shared-agent-runtime-shell
    init: true
    stdin_open: true
    tty: true
    working_dir: /runtime
    environment:
      RUNTIME_ROOT: /runtime
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      VPS_PERSONAL_CODEX_MISTRAL_API_KEY: ${VPS_PERSONAL_CODEX_MISTRAL_API_KEY:-}
      WEEKLY_IDEATOR_MISTRAL_API_KEY: ${WEEKLY_IDEATOR_MISTRAL_API_KEY:-}
      MOODLE_ACTIONS_MISTRAL_API_KEY: ${MOODLE_ACTIONS_MISTRAL_API_KEY:-}
    volumes:
      - ./runtime:/runtime
    command: ["sleep", "infinity"]

  agent-runtime-bridge:
    image: shared-agent-vps-runtime:local
    container_name: shared-agent-runtime-bridge
    init: true
    working_dir: /runtime
    environment:
      PORT: ${PORT:-11437}
      HOST: ${HOST:-0.0.0.0}
      PROXY_KEY_ID_ACTIVE: ${PROXY_KEY_ID_ACTIVE:?set PROXY_KEY_ID_ACTIVE}
      PROXY_SIGNING_KEY_ACTIVE: ${PROXY_SIGNING_KEY_ACTIVE:?set PROXY_SIGNING_KEY_ACTIVE}
      PROXY_KEY_ID_PREVIOUS: ${PROXY_KEY_ID_PREVIOUS:-}
      PROXY_SIGNING_KEY_PREVIOUS: ${PROXY_SIGNING_KEY_PREVIOUS:-}
      PROXY_MAX_SKEW_SECONDS: ${PROXY_MAX_SKEW_SECONDS:-90}
      PROXY_NONCE_TTL_SECONDS: ${PROXY_NONCE_TTL_SECONDS:-120}
      CODEX_MODEL: ${CODEX_MODEL:-}
      CODEX_ALLOW_DANGEROUS: ${CODEX_ALLOW_DANGEROUS:-true}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GH_TOKEN: ${GH_TOKEN:-}
      COPILOT_GITHUB_TOKEN: ${COPILOT_GITHUB_TOKEN:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      VPS_PERSONAL_CODEX_COPILOT_GITHUB_TOKEN: ${VPS_PERSONAL_CODEX_COPILOT_GITHUB_TOKEN:-}
      VPS_PERSONAL_CODEX_MISTRAL_API_KEY: ${VPS_PERSONAL_CODEX_MISTRAL_API_KEY:-}
      WEEKLY_IDEATOR_COPILOT_GITHUB_TOKEN: ${WEEKLY_IDEATOR_COPILOT_GITHUB_TOKEN:-}
      WEEKLY_IDEATOR_MISTRAL_API_KEY: ${WEEKLY_IDEATOR_MISTRAL_API_KEY:-}
      MOODLE_ACTIONS_COPILOT_GITHUB_TOKEN: ${MOODLE_ACTIONS_COPILOT_GITHUB_TOKEN:-}
      MOODLE_ACTIONS_MISTRAL_API_KEY: ${MOODLE_ACTIONS_MISTRAL_API_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_CODEX_AUTH_PREFIX: ${R2_CODEX_AUTH_PREFIX:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      R2_PORTFOLIO_PUBLIC_PREFIX: ${R2_PORTFOLIO_PUBLIC_PREFIX:-}
      R2_BROWSER_STATE_PREFIX: ${R2_BROWSER_STATE_PREFIX:-}
      BROWSER_PROVISIONER_URL: ${BROWSER_PROVISIONER_URL:-http://browser-provisioner:11438}
      SEEDPORTFOLIO_MONGODB_URI: ${SEEDPORTFOLIO_MONGODB_URI:-}
      SEEDPORTFOLIO_MONGODB_DB: ${SEEDPORTFOLIO_MONGODB_DB:-}
      SEEDPORTFOLIO_PROOFS_COLLECTION: ${SEEDPORTFOLIO_PROOFS_COLLECTION:-proofs}
      RUNTIME_ROOT: ${RUNTIME_ROOT:-/runtime}
      RUNTIME_APPS_CONFIG: ${RUNTIME_APPS_CONFIG:-/app/config/apps.json}
      VPS_PERSONAL_CODEX_COPILOT_MCP_GITHUB_URL: ${VPS_PERSONAL_CODEX_COPILOT_MCP_GITHUB_URL:-}
      VPS_PERSONAL_CODEX_COPILOT_MCP_DBANALYZER_URL: ${VPS_PERSONAL_CODEX_COPILOT_MCP_DBANALYZER_URL:-}
      VPS_PERSONAL_CODEX_COPILOT_MCP_DBWORKER_URL: ${VPS_PERSONAL_CODEX_COPILOT_MCP_DBWORKER_URL:-}
      VPS_PERSONAL_CODEX_COPILOT_MCP_COMPETENCIES_URL: ${VPS_PERSONAL_CODEX_COPILOT_MCP_COMPETENCIES_URL:-}
      VPS_PERSONAL_CODEX_COPILOT_MCP_MOODLE_URL: ${VPS_PERSONAL_CODEX_COPILOT_MCP_MOODLE_URL:-}
      WEEKLY_IDEATOR_COPILOT_MCP_GITHUB_URL: ${WEEKLY_IDEATOR_COPILOT_MCP_GITHUB_URL:-}
      WEEKLY_IDEATOR_COPILOT_MCP_DBANALYZER_URL: ${WEEKLY_IDEATOR_COPILOT_MCP_DBANALYZER_URL:-}
      WEEKLY_IDEATOR_COPILOT_MCP_DBWORKER_URL: ${WEEKLY_IDEATOR_COPILOT_MCP_DBWORKER_URL:-}
      WEEKLY_IDEATOR_COPILOT_MCP_COMPETENCIES_URL: ${WEEKLY_IDEATOR_COPILOT_MCP_COMPETENCIES_URL:-}
      WEEKLY_IDEATOR_COPILOT_MCP_MOODLE_URL: ${WEEKLY_IDEATOR_COPILOT_MCP_MOODLE_URL:-}
      MOODLE_ACTIONS_COPILOT_ENABLED_SERVERS: ${MOODLE_ACTIONS_COPILOT_ENABLED_SERVERS:-}
      MOODLE_ACTIONS_COPILOT_MCP_GITHUB_URL: ${MOODLE_ACTIONS_COPILOT_MCP_GITHUB_URL:-}
      MOODLE_ACTIONS_COPILOT_MCP_DBANALYZER_URL: ${MOODLE_ACTIONS_COPILOT_MCP_DBANALYZER_URL:-}
      MOODLE_ACTIONS_COPILOT_MCP_DBWORKER_URL: ${MOODLE_ACTIONS_COPILOT_MCP_DBWORKER_URL:-}
      MOODLE_ACTIONS_COPILOT_MCP_COMPETENCIES_URL: ${MOODLE_ACTIONS_COPILOT_MCP_COMPETENCIES_URL:-}
      MOODLE_ACTIONS_COPILOT_MCP_MOODLE_URL: ${MOODLE_ACTIONS_COPILOT_MCP_MOODLE_URL:-}
    volumes:
      - ./runtime:/runtime
      - ./config:/app/config:ro
      - ./bridge:/app/bridge:ro
    command: ["node", "/app/bridge/server.mjs"]
    ports:
      - "127.0.0.1:${PORT:-11437}:${PORT:-11437}"

  browser-provisioner:
    image: shared-agent-vps-runtime:local
    container_name: browser-provisioner
    init: true
    working_dir: /runtime
    environment:
      BROWSER_PROVISIONER_PORT: ${BROWSER_PROVISIONER_PORT:-11438}
      BROWSER_PROVISIONER_HOST: 0.0.0.0
      BROWSER_PROVISIONER_HEADLESS: ${BROWSER_PROVISIONER_HEADLESS:-false}
      BROWSER_PROVISIONER_DISPLAY: ${BROWSER_PROVISIONER_DISPLAY:-:99}
      BROWSER_PROVISIONER_SCREEN_SIZE: ${BROWSER_PROVISIONER_SCREEN_SIZE:-1440x960x24}
      BROWSER_PROVISIONER_RFB_PORT: ${BROWSER_PROVISIONER_RFB_PORT:-5900}
      BROWSER_PROVISIONER_NOVNC_PORT: ${BROWSER_PROVISIONER_NOVNC_PORT:-6080}
      BROWSER_PROVISIONER_PUBLIC_BASE_URL: ${BROWSER_PROVISIONER_PUBLIC_BASE_URL:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BROWSER_STATE_PREFIX: ${R2_BROWSER_STATE_PREFIX:-}
      PLAYWRIGHT_BROWSERS_PATH: ${PLAYWRIGHT_BROWSERS_PATH:-/ms-playwright}
      RUNTIME_ROOT: ${RUNTIME_ROOT:-/runtime}
    volumes:
      - ./runtime:/runtime
    command: ["node", "/app/browser-provisioner/server.mjs"]
    ports:
      - "${BROWSER_PROVISIONER_PUBLIC_BIND:-127.0.0.1}:${BROWSER_PROVISIONER_PUBLIC_PORT:-16080}:${BROWSER_PROVISIONER_NOVNC_PORT:-6080}"
